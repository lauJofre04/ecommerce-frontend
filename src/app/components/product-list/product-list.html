<div class="max-w-6xl mx-auto p-8">
  <h2 class="text-3xl font-bold text-gray-800 mb-8">Nuestros Productos</h2>

  <div class="flex flex-col md:flex-row gap-4 justify-between items-center mb-12">
  
    <div class="relative w-full md:w-2/3">
      <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
        <svg class="w-4 h-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
        </svg>
      </div>
      
      <input type="text" 
            [(ngModel)]="terminoBusqueda" 
            (input)="aplicarFiltros()"
            class="block w-full p-4 pl-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500" 
            placeholder="Buscar por nombre o descripción...">
    </div>

    <div class="w-full md:w-1/3">
      <select [(ngModel)]="categoriaSeleccionada" 
              (ngModelChange)="seleccionarCategoria($event)"
              class="block w-full p-4 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500 cursor-pointer outline-none">
        
        <option [ngValue]="null">Todas las categorías</option>
        
        <option *ngFor="let cat of categorias" [ngValue]="cat.id">
          {{ cat.nombre }}
        </option>
        
      </select>
    </div>

  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
    <div *ngFor="let p of productosFiltrados" [routerLink]="['/producto', p.id]" class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-100 flex flex-col transition-transform hover:scale-[1.02]">
      
      <div class="h-48 bg-gray-200">
        <img [src]="getProductImageUrl(p.imageName)" alt="{{ p.nombre }}">
      </div>

      <div class="p-4 flex-grow">
        <h3 class="font-bold text-lg text-gray-900">{{ p.nombre }}</h3>
        <p class="text-blue-600 font-bold text-xl mb-2">{{ p.precio | currency }}</p>
        
        <button (click)="agregarAlCarrito(p)" 
                class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-bold">
            Añadir al Carrito
        </button>
      </div>
    </div> 
  </div>

  <div *ngIf="productosFiltrados.length === 0 && terminoBusqueda !== ''" class="text-center text-gray-500 my-20">
    <p class="text-xl">No se encontraron productos para <strong>"{{ terminoBusqueda }}"</strong>.</p>
  </div>
</div>
