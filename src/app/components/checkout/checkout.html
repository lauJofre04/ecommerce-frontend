<div class="max-w-6xl mx-auto p-6 mt-8 flex flex-col md:flex-row gap-8">
  
  <div class="w-full md:w-2/3 bg-white rounded-xl shadow-md p-8 border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Datos de Envío 🚚</h2>
    
    <form (ngSubmit)="irAPagar()" #envioForm="ngForm" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Dirección de entrega (Calle y altura)</label>
        <input type="text" name="direccion" [(ngModel)]="datosEnvio.direccion" required
               class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" 
               placeholder="Ej: Av. San Martín 1234">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
          <input type="text" name="ciudad" [(ngModel)]="datosEnvio.ciudad" required
                 class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Código Postal</label>
          <input type="text" name="codigoPostal" [(ngModel)]="datosEnvio.codigoPostal" required
                 class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Provincia</label>
        <select name="provincia" [(ngModel)]="datosEnvio.provincia" required
                class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
          <option value="" disabled selected>Seleccioná tu provincia...</option>
          <option value="Buenos Aires">Buenos Aires</option>
          <option value="CABA">Capital Federal</option>
          <option value="Córdoba">Córdoba</option>
          <option value="Santa Fe">Santa Fe</option>
          </select>
      </div>

    </form>
  </div>

  <div class="w-full md:w-1/3">
    <div class="bg-gray-50 rounded-xl shadow-sm p-6 border border-gray-200 sticky top-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">Resumen de tu compra</h3>
      
      <div class="space-y-3 text-gray-600 border-b border-gray-200 pb-4 mb-4">
        <div class="flex justify-between">
          <span>Subtotal productos</span>
          <span class="font-medium">{{ totalCarrito | currency }}</span>
        </div>
        <div class="flex justify-between">
          <span>Costo de envío</span>
          <span class="font-medium">{{ costoEnvio | currency }}</span>
        </div>
      </div>
      
      <div class="flex justify-between items-center mb-6">
        <span class="text-xl font-bold text-gray-900">Total</span>
        <span class="text-2xl font-bold text-blue-600">{{ totalFinal | currency }}</span>
      </div>

      <button (click)="irAPagar()" 
              [disabled]="!envioForm.form.valid"
              [class.opacity-50]="!envioForm.form.valid"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition text-lg shadow-md">
        Ir a Pagar
      </button>
      <p class="text-xs text-center text-gray-400 mt-3">
        *El botón se habilita al completar todos los datos.
      </p>
    </div>
  </div>

</div>
