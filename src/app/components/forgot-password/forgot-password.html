<div class="max-w-md mx-auto mt-20 p-8 bg-white rounded-xl shadow-md border border-gray-100">
  <h2 class="text-2xl font-bold mb-2 text-center text-gray-800">Recuperar Contraseña</h2>
  <p class="text-sm text-gray-600 mb-6 text-center">Ingresá tu email y te enviaremos un enlace para crear una nueva contraseña.</p>
  
  <form (ngSubmit)="onSubmit()">
    <div class="mb-6">
      <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
      <input type="email" [(ngModel)]="email" name="email" required
             class="w-full px-3 py-2 border rounded-lg bg-gray-50">
    </div>

    <button type="submit" [disabled]="cargando" 
            class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 disabled:opacity-50">
      {{ cargando ? 'Enviando...' : 'Enviar enlace' }}
    </button>

    <div *ngIf="mensaje" class="mt-4 p-3 bg-green-100 text-green-700 rounded-lg text-center text-sm">
      {{ mensaje }}
    </div>
    <div *ngIf="error" class="mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-center text-sm">
      {{ error }}
    </div>
  </form>
</div>
