<div class="max-w-4xl mx-auto p-8">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Tu Carrito 🛒</h2>
    <button *ngIf="items.length > 0" 
            (click)="vaciarCarrito()" 
            class="text-sm text-red-500 hover:underline font-medium">
        Vaciar carrito
    </button>
  </div>

  <div *ngIf="items.length === 0" class="bg-blue-50 p-8 rounded-2xl text-center">
    <p class="text-blue-600 font-medium mb-4">El carrito está vacío.</p>
    <button routerLink="/" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">
      Ir a ver productos
    </button>
  </div>

  <div *ngIf="items.length > 0" class="space-y-4">
    <div *ngFor="let item of items; let i = index" 
         class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-gray-100">
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-gray-100 rounded-lg overflow-hidden">
             <img [src]="item.imagenUrl ? 'http://localhost:3000/uploads/' + item.imagenUrl : 'https://placehold.co/100'" class="object-cover w-full h-full">
        </div>
        <div>
          <h3 class="font-bold text-gray-800">{{ item.nombre }}</h3>
          <p class="text-sm text-gray-500">Precio unitario: {{ item.precio | currency }}</p>
        </div>
      </div>
      
      <div class="flex items-center gap-6">
        <span class="font-bold text-lg">{{ item.precio | currency }}</span>
        <button (click)="eliminar(i)" class="text-red-500 hover:text-red-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>
    </div>

    <div class="mt-8 bg-gray-900 text-white p-6 rounded-2xl flex justify-between items-center">
      <div>
        <p class="text-gray-400 text-sm">Total a pagar</p>
        <h3 class="text-3xl font-bold">{{ total | currency }}</h3>
      </div>
      <button routerLink="/checkout" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl font-bold transition text-white">
        Finalizar Compra
      </button>
    </div>
  </div>
</div>
