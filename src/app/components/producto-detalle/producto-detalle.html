<div class="max-w-6xl mx-auto p-4 mt-8">
  
  <button (click)="volver()" class="text-blue-500 hover:text-blue-700 font-medium mb-6 flex items-center gap-2 transition">
    <span>&larr;</span> Volver al listado
  </button>

  <div *ngIf="cargando" class="text-center py-20 text-gray-500 text-xl font-bold">
    Cargando producto...
  </div>

  <div *ngIf="!cargando && producto" class="bg-white rounded-xl shadow-md border border-gray-100 p-6 md:p-10 flex flex-col md:flex-row gap-10">
    
    <div class="w-full md:w-1/2 flex justify-center items-start">
      <img [src]="obtenerImagen(producto.imagenUrl)" 
     [alt]="producto.nombre" 
     class="max-w-full h-auto object-contain rounded-lg shadow-sm border border-gray-100 p-2">
    </div>

    <div class="w-full md:w-1/2 flex flex-col justify-start">
      
      <p class="text-sm text-gray-500 mb-2">Nuevo | {{ producto.stockDisponible }} vendidos</p>
      
      <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4 leading-tight">
        {{ producto.nombre }}
      </h1>
      
      <div class="text-5xl font-light text-gray-900 mb-6">
        ${{ producto.precio | number:'1.0-0' }}
      </div>

      <div class="mb-8">
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Lo que tenés que saber de este producto:</h3>
        <p class="text-gray-600 leading-relaxed text-sm md:text-base">
          {{ producto.descripcion }}
        </p>
      </div>

      <div class="mt-auto space-y-3">
        <p *ngIf="producto.stockDisponible > 0" class="text-green-600 font-bold mb-2">
          ¡Stock disponible!
        </p>
        <p *ngIf="producto.stockDisponible <= 0" class="text-red-500 font-bold mb-2">
          Producto sin stock por el momento.
        </p>

        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition text-lg shadow-md"
                [disabled]="producto.stockDisponible <= 0"
                [class.opacity-50]="producto.stockDisponible <= 0"
                [class.cursor-not-allowed]="producto.stockDisponible <= 0">
          Comprar ahora
        </button>
        
        <button (click)="agregarAlCarrito()" 
                class="w-full bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold py-4 rounded-lg transition text-lg border border-blue-200"
                [disabled]="producto.stockDisponible <= 0"
                [class.opacity-50]="producto.stockDisponible <= 0"
                [class.cursor-not-allowed]="producto.stockDisponible <= 0">
          Agregar al carrito
        </button>
      </div>

    </div>
  </div>

  <div *ngIf="!cargando && !producto" class="text-center py-20 text-red-500 text-2xl font-bold">
    Producto no encontrado.
  </div>

</div>
