<div class="max-w-md mx-auto mt-20 p-8 bg-white rounded-xl shadow-md border border-gray-100">
  <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Crear Cuenta</h2>
  
  <form (ngSubmit)="onSubmit()">
    
    <div class="mb-4">
      <label class="block text-gray-700 text-sm font-bold mb-2">Nombre</label>
      <input type="text" [(ngModel)]="nuevoUsuario.nombre" name="nombre" required
             class="w-full px-3 py-2 border rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Apellido</label>
        <input type="text" [(ngModel)]="nuevoUsuario.apellido" name="apellido" required
                class="w-full px-3 py-2 border rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
      <input type="email" [(ngModel)]="nuevoUsuario.email" name="email" required
             class="w-full px-3 py-2 border rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 text-sm font-bold mb-2">Contraseña</label>
      <input type="password" [(ngModel)]="nuevoUsuario.password" name="password" required
             class="w-full px-3 py-2 border rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-700 transition">
      Registrarme
    </button>

    <div class="mt-4 text-center">
      <p class="text-sm text-gray-600">¿Ya tenés cuenta? 
        <a routerLink="/login" class="text-blue-600 hover:underline font-bold">Iniciá sesión acá</a>
      </p>
    </div>
  </form>
</div>
